version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: starlink_billing_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-starlink_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-starlink_pass}
      POSTGRES_DB: ${DB_NAME:-starlink_billing}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-starlink_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: starlink_billing_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: starlink_billing_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: starlink_billing_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env.local
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: starlink_billing_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
